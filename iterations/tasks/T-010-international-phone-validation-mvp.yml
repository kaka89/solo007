id: T-010
title: 国际手机号验证 MVP 实现
status: planned
priority: high
created: 2026-04-18
owner: eng-brain
estimated_hours: 40
actual_hours: 0

description: |
  实现国际手机号验证功能的 MVP 版本，支持主要国家的手机号格式验证和验证码发送。

details: |
  ### 技术调研和准备 (预计: 8小时)
  1. 调研国际短信服务商（Twilio、Nexmo等），选择合适供应商
  2. 评估 libphonenumber 库的集成方案
  3. 设计数据库表结构变更
  4. 制定安全防护策略
  5. 确定支持的国家列表（至少20个主要国家）

  ### 后端开发 (预计: 16小时)
  1. 集成 libphonenumber 库进行手机号格式验证
  2. 实现国家代码验证和运营商识别
  3. 集成国际短信服务商API
  4. 实现验证码管理（生成、发送、验证、过期处理）
  5. 添加安全防护机制（频率限制、黑名单、设备指纹）
  6. 创建验证记录表用于分析和监控
  7. 编写单元测试和集成测试

  ### 前端开发 (预计: 12小时)
  1. 开发国家选择组件（支持搜索、常用国家置顶、国旗显示）
  2. 开发国际手机号输入组件（实时格式验证、自动格式化）
  3. 集成验证码发送和验证流程
  4. 实现多语言错误提示
  5. 基于IP自动识别推荐国家
  6. 编写组件测试

  ### 测试和部署 (预计: 4小时)
  1. 端到端测试（完整注册流程）
  2. 性能测试（接口响应时间、并发处理）
  3. 安全测试（防止短信轰炸、暴力破解）
  4. 部署到测试环境
  5. 监控配置（成功率、响应时间、错误率）

acceptance_criteria:
  - 支持至少20个主要国家的手机号格式验证
  - 集成国际短信服务商，实现验证码发送
  - 实现国家选择界面，支持搜索和常用国家置顶
  - 验证码发送成功率 > 95%
  - 验证接口响应时间 < 200ms
  - 完整的错误处理和用户提示
  - 通过安全审计，防止短信轰炸攻击
  - 支持基于IP的国家自动识别
  - 验证码有效期5分钟，发送频率限制60秒/次
  - 验证失败次数限制5次/小时

technical_spec: |
  ### 前端技术栈
  - **框架**: React 18+
  - **状态管理**: React Hooks
  - **HTTP客户端**: axios
  - **UI组件**: 自定义组件
  - **国际化**: react-i18next
  - **测试**: Jest + React Testing Library

  ### 后端技术栈
  - **框架**: Node.js + Express
  - **数据库**: MongoDB
  - **短信服务**: Twilio / Nexmo
  - **手机号验证**: libphonenumber-js
  - **缓存**: Redis
  - **测试**: Jest + Supertest

  ### API 设计
  ```http
  # 获取国家列表
  GET /api/countries
  响应:
  [
    {
      "code": "US",
      "name": "United States",
      "dialCode": "+1",
      "flag": "🇺🇸"
    }
  ]

  # 发送验证码
  POST /api/auth/international/send-code
  Body:
  {
    "countryCode": "US",
    "phoneNumber": "5551234567"
  }
  响应成功 (200):
  {
    "success": true,
    "message": "验证码已发送",
    "data": {
      "expiresIn": 300
    }
  }

  # 验证验证码
  POST /api/auth/international/verify-code
  Body:
  {
    "countryCode": "US",
    "phoneNumber": "5551234567",
    "code": "123456"
  }
  响应成功 (200):
  {
    "success": true,
    "message": "验证成功",
    "data": {
      "token": "jwt_token",
      "user": { ... }
    }
  }
  ```

dependencies:
  - 国际短信服务商账号和API密钥
  - libphonenumber 库
  - 前端UI组件库支持
  - 用户认证系统已就绪
  - 数据库可扩展

risks:
  - 风险: 国际短信到达率低
    缓解: 选择多家服务商，监控到达率，自动切换
  - 风险: 验证库不准确
    缓解: 定期更新库版本，添加手动验证规则
  - 风险: 性能问题
    缓解: 实施Redis缓存，优化数据库查询
  - 风险: 安全漏洞
    缓解: 严格的安全审计，渗透测试，频率限制

success_metrics:
  - 验证码发送成功率 > 95%
  - 验证接口响应时间 < 200ms
  - 国际用户注册转化率提升
  - 系统稳定性（无重大故障）
  - 安全事件（无安全漏洞）

